<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Animated demo for Romanian deadlift">
  <defs>
    <linearGradient id="rdlBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5eee5"/>
      <stop offset="100%" stop-color="#eadbc6"/>
    </linearGradient>
    <style>
      .label { font: 600 18px 'Avenir Next', 'Segoe UI', sans-serif; fill: #14324a; }
      .hint { font: 500 13px 'Avenir Next', 'Segoe UI', sans-serif; fill: #5d7285; }
    </style>
  </defs>
  <rect width="480" height="320" rx="28" fill="url(#rdlBg)"/>
  <rect x="28" y="24" width="424" height="272" rx="24" fill="#fffaf1" stroke="#0d3b66" stroke-opacity=".12"/>
  <text x="42" y="54" class="label">Romanian Deadlift</text>
  <text x="42" y="74" class="hint">Push hips back. Keep the weights close to the legs.</text>
  <g>
    <circle cx="234" cy="98" r="20" fill="#1f2f3d">
      <animate attributeName="cx" values="234;262;234" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="98;114;98" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <line x1="236" y1="118" x2="236" y2="182" stroke="#d48657" stroke-width="16" stroke-linecap="round">
      <animate attributeName="x2" values="236;256;236" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="182;188;182" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="236" y1="142" x2="186" y2="170" stroke="#d48657" stroke-width="12" stroke-linecap="round">
      <animate attributeName="x1" values="236;248;236" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="142;150;142" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="186;212;186" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="170;184;170" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="236" y1="142" x2="286" y2="170" stroke="#d48657" stroke-width="12" stroke-linecap="round">
      <animate attributeName="x1" values="236;248;236" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="142;150;142" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="286;304;286" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="170;184;170" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="236" y1="182" x2="208" y2="248" stroke="#d48657" stroke-width="14" stroke-linecap="round">
      <animate attributeName="x1" values="236;256;236" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="182;188;182" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="208;222;208" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="248;252;248" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="236" y1="182" x2="264" y2="248" stroke="#d48657" stroke-width="14" stroke-linecap="round">
      <animate attributeName="x1" values="236;256;236" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="182;188;182" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="264;282;264" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="248;252;248" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <rect x="174" y="166" width="22" height="48" rx="8" fill="#3e4d5c">
      <animate attributeName="x" values="164;196;164" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="156;182;156" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="276" y="166" width="22" height="48" rx="8" fill="#3e4d5c">
      <animate attributeName="x" values="296;314;296" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="156;182;156" dur="2.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
