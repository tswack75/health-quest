<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Animated demo for incline push-up">
  <defs>
    <linearGradient id="pushBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4f0e5"/>
      <stop offset="100%" stop-color="#e9dfcc"/>
    </linearGradient>
    <style>
      .label { font: 600 18px 'Avenir Next', 'Segoe UI', sans-serif; fill: #14324a; }
      .hint { font: 500 13px 'Avenir Next', 'Segoe UI', sans-serif; fill: #5d7285; }
    </style>
  </defs>
  <rect width="480" height="320" rx="28" fill="url(#pushBg)"/>
  <rect x="28" y="24" width="424" height="272" rx="24" fill="#fffaf1" stroke="#0d3b66" stroke-opacity=".12"/>
  <text x="42" y="54" class="label">Incline Push-Up</text>
  <text x="42" y="74" class="hint">Straight body line. Lower chest to the surface.</text>
  <rect x="300" y="118" width="84" height="120" rx="12" fill="#b78c65"/>
  <g>
    <circle cx="184" cy="126" r="16" fill="#1f2f3d">
      <animate attributeName="cy" values="138;126;138" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <line x1="196" y1="140" x2="278" y2="152" stroke="#d48657" stroke-width="16" stroke-linecap="round">
      <animate attributeName="y1" values="152;140;152" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="164;152;164" dur="2.1s" repeatCount="indefinite"/>
    </line>
    <line x1="224" y1="144" x2="318" y2="144" stroke="#d48657" stroke-width="12" stroke-linecap="round">
      <animate attributeName="y1" values="156;144;156" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="156;144;156" dur="2.1s" repeatCount="indefinite"/>
    </line>
    <line x1="226" y1="156" x2="160" y2="214" stroke="#d48657" stroke-width="12" stroke-linecap="round">
      <animate attributeName="y1" values="168;156;168" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="226;214;226" dur="2.1s" repeatCount="indefinite"/>
    </line>
    <line x1="270" y1="160" x2="210" y2="224" stroke="#d48657" stroke-width="12" stroke-linecap="round">
      <animate attributeName="y1" values="172;160;172" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="236;224;236" dur="2.1s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
