<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Animated demo for plank">
  <defs>
    <linearGradient id="plankBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f0e7"/>
      <stop offset="100%" stop-color="#eadfce"/>
    </linearGradient>
    <style>
      .label { font: 600 18px 'Avenir Next', 'Segoe UI', sans-serif; fill: #14324a; }
      .hint { font: 500 13px 'Avenir Next', 'Segoe UI', sans-serif; fill: #5d7285; }
    </style>
  </defs>
  <rect width="480" height="320" rx="28" fill="url(#plankBg)"/>
  <rect x="28" y="24" width="424" height="272" rx="24" fill="#fffaf1" stroke="#0d3b66" stroke-opacity=".12"/>
  <text x="42" y="54" class="label">Plank</text>
  <text x="42" y="74" class="hint">Ribs down. Glutes lightly tight. Hold a clean line.</text>
  <rect x="84" y="228" width="312" height="8" rx="4" fill="#c7ccd4"/>
  <g>
    <circle cx="142" cy="170" r="18" fill="#1f2f3d">
      <animate attributeName="cy" values="170;168;170" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <line x1="156" y1="182" x2="276" y2="186" stroke="#d48657" stroke-width="16" stroke-linecap="round">
      <animate attributeName="y2" values="186;182;186" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <line x1="206" y1="186" x2="190" y2="230" stroke="#d48657" stroke-width="12" stroke-linecap="round"/>
    <line x1="250" y1="186" x2="266" y2="230" stroke="#d48657" stroke-width="12" stroke-linecap="round"/>
    <line x1="276" y1="186" x2="340" y2="214" stroke="#d48657" stroke-width="14" stroke-linecap="round">
      <animate attributeName="y1" values="186;182;186" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="214;210;214" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <line x1="156" y1="182" x2="114" y2="216" stroke="#d48657" stroke-width="12" stroke-linecap="round">
      <animate attributeName="y1" values="182;180;182" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="216;214;216" dur="2.6s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
